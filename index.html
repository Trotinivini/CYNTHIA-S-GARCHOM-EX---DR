<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CYNTHIA'S GARCHOMP EX - DESTINED RIVALS</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;

      background-image: url("fondo.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      overflow: hidden;
    }

    .container {
      perspective: 1000px;
      margin-bottom: 20px;
    }

    .card {
      width: 300px;
      height: 420px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
      cursor: pointer;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .card img {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      position: absolute;
      backface-visibility: hidden;
      object-fit: cover;
      pointer-events: none;
    }

    .card img.back {
      transform: rotateY(180deg);
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2d72d9;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      transition: background 0.3s;
    }

    button:hover {
      background: #1b4ea0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card" id="card">
      <img src="front.jpg" class="front" />
      <img src="back.jpg" class="back" />
    </div>
  </div>

  <div class="buttons">
    <button id="flipBtn">Girar carta</button>
  </div>

  <script>
    const card = document.getElementById("card");
    const flipBtn = document.getElementById("flipBtn");

    let flipped = false;
    let isDragging = false;

    flipBtn.addEventListener("click", () => {
      flipped = !flipped;
      resetTransform();
    });

    function getBaseTransform() {
      return `rotateY(${flipped ? 180 : 0}deg)`;
    }

    function resetTransform() {
      card.style.transform = getBaseTransform();
    }

    function applyTilt(clientX, clientY) {
      const rect = card.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = ((y - centerY) / centerY) * 100;
      const rotateY = ((x - centerX) / centerX) * 100;
      const baseY = flipped ? 180 : 0;

      card.style.transform = `
        rotateY(${baseY}deg)
        rotateX(${-rotateX}deg)
        rotateZ(${rotateY}deg)
      `;
    }

    // PC events
    card.addEventListener("mousedown", () => { isDragging = true; });
    card.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      applyTilt(e.clientX, e.clientY);
    });

    ["mouseup", "mouseleave"].forEach(event => {
      card.addEventListener(event, () => {
        if (isDragging) {
          isDragging = false;
          resetTransform();
        }
      });
    });

    // Mobile events
    card.addEventListener("touchstart", (e) => { 
      isDragging = true;
      e.preventDefault(); 
    });

    card.addEventListener("touchmove", (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const touch = e.touches[0];
      applyTilt(touch.clientX, touch.clientY);
    });

    card.addEventListener("touchend", () => {
      isDragging = false;
      resetTransform();
    });

    resetTransform();
  </script>

</body>
</html>
